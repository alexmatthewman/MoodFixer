services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aireliefdb
      POSTGRES_USER: airelief
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airelief -d aireliefdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__IdentityConnection=Host=db;Database=aireliefdb;Username=airelief;Password=localdev123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
